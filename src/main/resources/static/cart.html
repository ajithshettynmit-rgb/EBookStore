<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - E-Bookstore</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }

        .navbar {
            background: #333;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .navbar h1 {
            font-size: 1.5rem;
        }

        .navbar .nav-links {
            display: flex;
            gap: 2rem;
        }

        .navbar a {
            color: white;
            text-decoration: none;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h2 {
            color: #333;
        }

        .cart-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .cart-items {
            background: white;
            border-radius: 10px;
            padding: 2rem;
        }

        .cart-item {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem;
            border-bottom: 1px solid #e0e0e0;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .item-image {
            width: 100px;
            height: 120px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .item-details {
            flex: 1;
        }

        .item-title {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .item-author {
            color: #666;
            margin-bottom: 0.5rem;
        }

        .item-price {
            font-size: 1.3rem;
            color: #667eea;
            font-weight: bold;
        }

        .item-actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: flex-end;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .quantity-btn {
            width: 30px;
            height: 30px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .quantity-btn:hover {
            background: #764ba2;
        }

        .quantity {
            padding: 0.5rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            min-width: 50px;
            text-align: center;
        }

        .remove-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
        }

        .remove-btn:hover {
            background: #c82333;
        }

        .cart-summary {
            background: white;
            border-radius: 10px;
            padding: 2rem;
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .cart-summary h3 {
            margin-bottom: 1.5rem;
            color: #333;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: #666;
        }

        .summary-row.total {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            padding-top: 1rem;
            border-top: 2px solid #e0e0e0;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }

        .btn:hover {
            background: #764ba2;
        }

        .empty-cart {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .empty-cart a {
            color: #667eea;
            text-decoration: none;
        }

        .cart-badge {
            background: #ff4444;
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 10px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>📚 E-Bookstore</h1>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart <span class="cart-badge" id="cartCount">0</span></a>
            <a href="orders.html">My Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2>🛒 Shopping Cart</h2>
        </div>

        <div id="cartContainer"></div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8080/api';
        const user = JSON.parse(localStorage.getItem('user') || 'null');

        if (!user) {
            window.location.href = 'login.html';
        }

        async function loadCart() {
            try {
                const response = await fetch(`${API_BASE_URL}/cart?userId=${user.id}`);
                const cart = await response.json();
                displayCart(cart);
            } catch (error) {
                document.getElementById('cartContainer').innerHTML = 
                    '<div class="empty-cart">Error loading cart</div>';
            }
        }

        function displayCart(cart) {
            const container = document.getElementById('cartContainer');
            
            if (!cart.items || cart.items.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <h3>Your cart is empty</h3>
                        <p><a href="products.html">Continue Shopping</a></p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="cart-container">
                    <div class="cart-items">
                        ${cart.items.map(item => `
                            <div class="cart-item">
                                <div class="item-image">📖</div>
                                <div class="item-details">
                                    <div class="item-title">${item.product.title}</div>
                                    <div class="item-author">by ${item.product.author}</div>
                                    <div class="item-price">₹${item.product.price.toFixed(2)}</div>
                                </div>
                                <div class="item-actions">
                                    <div class="quantity-control">
                                        <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                                        <div class="quantity">${item.quantity}</div>
                                        <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                                    </div>
                                    <div class="item-price">₹${item.subtotal.toFixed(2)}</div>
                                    <button class="remove-btn" onclick="removeItem(${item.id})">Remove</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="cart-summary">
                        <h3>Order Summary</h3>
                        <div class="summary-row">
                            <span>Subtotal (${cart.items.length} items)</span>
                            <span>₹${cart.total.toFixed(2)}</span>
                        </div>
                        <div class="summary-row">
                            <span>Delivery</span>
                            <span>Free</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total</span>
                            <span>₹${cart.total.toFixed(2)}</span>
                        </div>
                        <button class="btn" onclick="proceedToCheckout()">Proceed to Checkout</button>
                    </div>
                </div>
            `;

            document.getElementById('cartCount').textContent = cart.items.length;
        }

        async function updateQuantity(itemId, newQuantity) {
            if (newQuantity < 1) return;

            try {
                const response = await fetch(`${API_BASE_URL}/cart/items/${itemId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quantity: newQuantity })
                });

                if (response.ok) {
                    loadCart();
                }
            } catch (error) {
                alert('Error updating quantity');
            }
        }

        async function removeItem(itemId) {
            if (!confirm('Remove this item from cart?')) return;

            try {
                const response = await fetch(`${API_BASE_URL}/cart/items/${itemId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadCart();
                }
            } catch (error) {
                alert('Error removing item');
            }
        }

        function proceedToCheckout() {
            window.location.href = 'checkout.html';
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        loadCart();
    </script>
</body>
</html>
